name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "Resolved version: $ver"

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: >
          dotnet publish SonnyTray.csproj
          --configuration Release
          --self-contained
          --runtime win-x64
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output publish

      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI
        working-directory: installer
        run: >
          wix build SonnyTray.wxs
          -d Version=${{ steps.version.outputs.VERSION }}
          -d "PublishDir=${{ github.workspace }}\publish"
          -o ${{ github.workspace }}\SonnyTray-${{ steps.version.outputs.VERSION }}.msi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SonnyTray v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            SonnyTray-${{ steps.version.outputs.VERSION }}.msi
            publish/SonnyTray.exe
